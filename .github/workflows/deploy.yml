name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        run: |
          node -v
          npm -v
          if ! node -v | grep -qE '^v(2[0-9]|1[8-9])'; then
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build for GitHub Pages
        run: npm run build
        env:
          BASE_PATH: ./

      - name: Deploy to gh-pages branch
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DEPLOY_DIR="$(mktemp -d)"
          cp -a dist/. "${DEPLOY_DIR}/"
          touch "${DEPLOY_DIR}/.nojekyll"

          cd "${DEPLOY_DIR}"
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy ${GITHUB_SHA}"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Point GitHub Pages at gh-pages
        run: |
          set -euo pipefail

          BODY='{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'

          CODE=$(curl -sS -o /tmp/pages-resp.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            -d "${BODY}" || true)

          if [ "${CODE}" = "409" ] || [ "${CODE}" = "422" ]; then
            CODE=$(curl -sS -o /tmp/pages-resp.json -w "%{http_code}" \
              -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
              -d "${BODY}" || true)
          fi

          echo "Pages API status: ${CODE}"
          cat /tmp/pages-resp.json || true

          if [ "${CODE}" != "200" ] && [ "${CODE}" != "201" ] && [ "${CODE}" != "204" ]; then
            echo "Could not update Pages source via API (status ${CODE})."
            echo "Set Settings → Pages → Branch: gh-pages / (root) manually if needed."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
